services:
  postgres:
    image: postgres:16
    container_name: cs_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_system
    ports:
      - "5432:5432"
  
  redis:
    image: redis:7
    container_name: cs_redis
    ports:
      - "6379:6379"